<!DOCTYPE html>
<html>
  <head>
    <title>Matt Born</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://kit.fontawesome.com/484ee0d259.js" crossorigin="anonymous"></script>
    <script defer src="remix.js"></script>
  </head>
  <body>
    <div id="top">
      <div class="brand">Matt Born</div>
      <a class="button" href="https://calendly.com/mattborn/30min">
        Book a call
        <i class="fa-regular fa-long-arrow-right"></i>
      </a>
    </div>
    <div id="hero">
      <div class="status">
        <i class="fa-regular fa-circle-check"></i>
        Available for full-time work.
      </div>
      <small>in the style of <b id="style">Matt</b></small>
      <h1 id="headline">Full Stack Designer</h1>
      <p id="lede">👋🏼 Hey! I’m a product designer, coder, and AI architect based in Salt Lake.</p>
      <div class="actions">
        <a class="button" href="https://calendly.com/mattborn/30min">
          Schedule a call
          <i class="fa-regular fa-long-arrow-right"></i>
        </a>
        <a class="link" href="https://moona.design">
          <i class="fa-solid fa-moon"></i>
          Hire my agency
        </a>
        <a class="link linkedin" href="https://linkedin.com/in/mattborn">
          <i class="fa-brands fa-linkedin"></i>
          Connect with me on LinkedIn
        </a>
        <a class="link dribbble" href="https://dribbble.com/mattborn">
          <i class="fa-brands fa-dribbble"></i>
          View my work on Dribbble
        </a>
      </div>
      <div id="headshot">
        <small>Generated with AI</small>
        <div id="remix">
          <i class="fa-regular fa-microchip-ai"></i>
          Remix
        </div>
      </div>
    </div>
  </body>
</html>
